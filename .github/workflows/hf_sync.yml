name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Create a temporary directory for the HF repo
          TMP_DIR=$(mktemp -d)
          
          # 2. Copy the contents of the backend folder to the temporary directory
          cp -r backend/* $TMP_DIR/
          
          # 3. Navigate to the temporary directory
          cd $TMP_DIR
          
          # 4. Initialize a new git repository
          git init
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          # 5. Add all files and commit
          git add .
          git commit -m "Sync from GitHub: ${{ github.sha }}"
          
          # 6. Push to Hugging Face Space
          # Note: Replace <YOUR_HF_USERNAME>/<YOUR_SPACE_NAME> with your actual Space path
          # For example: kotidev518/Test-sample-backend
          git push --force https://kotidev518:$HF_TOKEN@huggingface.co/spaces/kotidev518/backend main
